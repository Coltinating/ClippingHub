<!doctype html>
<!--
  Timeline scroll-zoom + minimap prototype
  ────────────────────────────────────────
  Non-production sketch for evaluating a video-editor-style scrubber
  sized for a 5-hour video. Open directly in any browser:

      prototypes/timeline-zoom/index.html

  Disposable. Touches no production code. To remove:

      rm -rf prototypes/timeline-zoom/

  v3 — CapCut/Vegas-style direct manipulation on the precise strip.
       Anchor strip is purely visual feedback (not interactive).

  Mouse on the precise (lower) strip:
      Drag empty area          pan the view (Photoshop hand tool feel)
      Drag the playhead        scrub through the video
      Click                    seek to that point
      Wheel                    zoom in/out around cursor
      Shift + wheel            pan horizontally
      Trackpad horizontal      pan horizontally

  Keyboard:
      ← / →                    nudge playhead by 1 frame (1/30s)
      Shift + ← / →            nudge by 1 second
      Ctrl + ← / →             nudge by 10 seconds
      I / O                    mark IN / OUT at playhead
      Esc                      clear marks
      R                        reset to full zoom

  Arrow nudges auto-follow: if the playhead leaves the view, the
  view slides to keep it on screen (5% margin).

  Click vs drag is disambiguated by a 4px movement threshold. Edge
  auto-pan kicks in when scrubbing near the left/right edge of the view
  so the user can scrub past the visible window without releasing.
-->
<html>
<head>
<meta charset="utf-8" />
<title>Timeline Zoom + Minimap — Prototype</title>
<style>
  /* ─── ClippingHub palette (matches src/styles.css :root tokens) ───── */
  :root {
    --bg:           #000000;
    --surface:      #0a0a0a;
    --surface-2:    #050505;
    --input:        #141414;
    --hover:        #1a1a1a;
    --border:       #1f1f1f;
    --border-l:     #2a2a2a;
    --accent:       #7b61ff;
    --accent-l:     #9582ff;
    --accent-dim:   rgba(123, 97, 255, 0.18);
    --text:         #ececec;
    --text-pri:     #ffffff;
    --muted:        #6a6a6a;
    --dim:          #a0a0a0;
    --in:           #2ecc71;
    --out:          #e74c3c;
    --scrubber:     #f0a030;          /* matches the app's --scrubber token */
    --grad-start:   #00ccb1;
    --grad-mid:     #7b61ff;
    --grad-end:     #ff61dc;
    --grad-h:       linear-gradient(90deg, var(--grad-start), var(--grad-mid), var(--grad-end));
    --r:            4px;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 12px;
    user-select: none; -webkit-user-select: none;
  }
  .page {
    max-width: 1200px; margin: 0 auto;
    padding: 14px 14px;
  }

  /* ─── Top header: gradient title + reset on far right ────────────── */
  .topbar {
    display: flex; align-items: center; gap: 12px;
    padding: 0 2px 12px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 12px;
  }
  /* Mirrors src/styles.css .header-logo : italic weight-800, "HUB" gradient */
  .brand {
    font-size: 15px; font-weight: 800;
    font-style: italic; letter-spacing: 0.04em;
    color: #fff;
  }
  .brand span {
    background: linear-gradient(to right, var(--grad-start), var(--grad-mid), var(--grad-end));
    background-size: 400% 400%;
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    color: transparent;
    animation: gradShift 10s ease infinite;
  }
  @keyframes gradShift {
    0%   { background-position: 0% 50%; }
    50%  { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
  .topbar .crumb {
    color: var(--muted); font-size: 10px; letter-spacing: 0.18em;
    text-transform: uppercase; padding-left: 4px;
    border-left: 1px solid var(--border); margin-left: 4px;
    line-height: 1; padding-top: 2px; padding-bottom: 2px;
  }
  .topbar .spacer { flex: 1; }
  /* Mirrors src/styles.css .header-btn — pill, ghost, hover-lift */
  .ghost-btn {
    background: transparent; color: var(--text-secondary, #a0a0a0);
    border: 1px solid rgba(255,255,255,0.08); border-radius: 999px;
    height: 24px; padding: 0 14px;
    font-size: 11px; font-weight: 500; cursor: pointer;
    font-family: inherit; line-height: 22px;
    transition: background 0.12s, color 0.12s, border-color 0.12s;
  }
  .ghost-btn:hover {
    background: rgba(255,255,255,0.06);
    border-color: rgba(255,255,255,0.15);
    color: var(--text-pri);
  }

  /* ─── Timeline section: collapsible wrapper with header + body + footer ── */
  .timeline {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r);
    overflow: hidden;
  }

  /* Header — chevron + title + IN/OUT/DUR mini-stats. Click to collapse. */
  .timeline-header {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 10px;
    cursor: pointer; user-select: none;
    border-bottom: 1px solid var(--border);
    transition: background 0.12s, border-color 0.15s;
  }
  .timeline-header:hover { background: rgba(255,255,255,0.025); }
  .timeline.collapsed .timeline-header { border-bottom-color: transparent; }
  .timeline-header .chev {
    width: 9px; height: 9px; color: var(--muted);
    flex-shrink: 0; transition: transform 0.18s;
  }
  .timeline.collapsed .timeline-header .chev { transform: rotate(-90deg); }
  .timeline-header .title {
    font-size: 9px; font-weight: 600;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--text);
  }
  .header-stats {
    margin-left: auto;
    display: flex; gap: 12px;
    font-family: 'Consolas', monospace; font-size: 11px;
    font-variant-numeric: tabular-nums;
  }
  .header-stats .stat { display: inline-flex; align-items: baseline; gap: 5px; }
  .header-stats .stat .lbl {
    font-family: 'Segoe UI', sans-serif;
    color: var(--muted); font-size: 9px;
    letter-spacing: 0.16em; text-transform: uppercase; font-weight: 500;
  }
  .header-stats .stat .val { color: var(--text); }
  .header-stats .stat.in  .val { color: var(--in); }
  .header-stats .stat.out .val { color: var(--out); }
  .header-stats .stat.dur .val { color: var(--accent-l); }

  /* Body — wraps the strips and footer; hidden when collapsed */
  .timeline-body { padding: 6px 8px 6px; }
  .timeline.collapsed .timeline-body { display: none; }

  /* Footer — Playhead/View readouts + Reset view (bottom right) */
  .timeline-footer {
    display: flex; align-items: center; gap: 14px;
    padding: 6px 2px 0;
    margin-top: 4px;
    border-top: 1px solid var(--border);
  }
  .timeline-footer .readout {
    display: inline-flex; align-items: baseline; gap: 5px;
    font-family: 'Consolas', monospace; font-size: 11px;
    font-variant-numeric: tabular-nums;
  }
  .timeline-footer .readout .lbl {
    font-family: 'Segoe UI', sans-serif;
    color: var(--muted); font-size: 9px;
    letter-spacing: 0.16em; text-transform: uppercase; font-weight: 500;
  }
  .timeline-footer .readout .val { color: var(--text); }
  .timeline-footer .readout .dim { color: var(--muted); margin: 0 1px; }
  .timeline-footer .spacer { flex: 1; }
  .timeline-footer .reset-btn {
    background: transparent; color: var(--dim);
    border: 1px solid rgba(255,255,255,0.08); border-radius: 999px;
    height: 22px; padding: 0 12px;
    font-size: 10.5px; font-weight: 500; cursor: pointer;
    font-family: inherit; line-height: 20px;
    transition: background 0.12s, color 0.12s, border-color 0.12s;
  }
  .timeline-footer .reset-btn:hover {
    background: rgba(255,255,255,0.06);
    border-color: rgba(255,255,255,0.15);
    color: var(--text-pri);
  }

  /* ─── Anchor strip — purely visual, never interactive ──────────── */
  .minimap-wrap {
    position: relative; height: 12px; margin-bottom: 2px;
    pointer-events: none;
  }
  .minimap {
    position: absolute; inset: 0;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 2px;
    overflow: hidden;
    cursor: default;
  }
  .minimap-viewport {
    position: absolute; top: -1px; bottom: -1px;
    background: var(--accent-dim);
    border-left:  2px solid var(--accent);
    border-right: 2px solid var(--accent);
    box-shadow: 0 0 0 1px rgba(123,97,255,0.20), 0 0 8px rgba(123,97,255,0.32);
    pointer-events: none;
    transition: left 80ms linear, width 80ms linear;
  }
  .minimap-playhead {
    position: absolute; top: 0; bottom: 0;
    width: 1px; background: var(--scrubber);
    pointer-events: none;
    box-shadow: 0 0 4px rgba(240,160,48,0.7);
  }
  .minimap-mark {
    position: absolute; top: 0; bottom: 0;
    width: 2px; pointer-events: none;
  }
  .minimap-mark.in  { background: var(--in); }
  .minimap-mark.out { background: var(--out); }
  .minimap-selection {
    position: absolute; top: 0; bottom: 0;
    background: rgba(46,204,113,0.10);
    pointer-events: none;
  }
  .minimap-labels {
    position: relative; height: 10px;
    color: var(--muted); font-size: 9px;
    font-variant-numeric: tabular-nums;
    font-family: 'Consolas', monospace;
    margin-bottom: 4px;
  }
  .minimap-labels span {
    position: absolute; top: 0;
    transform: translateX(-50%);
  }

  /* ─── Navigator strip — the interactive timeline ────────────────── */
  .scrubber-wrap { position: relative; }
  .scrubber {
    position: relative;
    height: 44px;
    background: var(--input);
    border: 1px solid var(--border-l);
    border-radius: 3px;
    overflow: hidden;
    cursor: grab;
    box-shadow:
      0 1px 0 rgba(255,255,255,0.03) inset,
      0 0 0 1px rgba(0,0,0,0.4);
  }
  .scrubber.panning   { cursor: grabbing; }
  .scrubber.scrubbing { cursor: ew-resize; }
  .scrubber-tick {
    position: absolute; top: 0; bottom: 13px;
    width: 1px; background: #232323;
    pointer-events: none;
  }
  .scrubber-tick.major { background: #353535; }
  .scrubber-tick-label {
    position: absolute; bottom: 2px;
    transform: translateX(-50%);
    color: var(--muted);
    font-size: 9px;
    font-variant-numeric: tabular-nums;
    font-family: 'Consolas', monospace;
    pointer-events: none; white-space: nowrap;
  }
  .scrubber-selection {
    position: absolute; top: 0; bottom: 0;
    background: rgba(46,204,113,0.10);
    border-left:  1px dashed rgba(46,204,113,0.4);
    border-right: 1px dashed rgba(231,76,60,0.4);
    pointer-events: none;
  }
  .scrubber-mark {
    position: absolute; top: 0; bottom: 0;
    width: 2px; pointer-events: none;
  }
  .scrubber-mark.in  { background: var(--in);  box-shadow: 0 0 6px rgba(46,204,113,0.6); }
  .scrubber-mark.out { background: var(--out); box-shadow: 0 0 6px rgba(231,76,60,0.6); }
  .scrubber-playhead {
    position: absolute; top: 0; bottom: 0;
    width: 1px; background: var(--scrubber);
    pointer-events: none;
    box-shadow: 0 0 6px rgba(240,160,48,0.7);
  }
  .scrubber-playhead::before {
    content: ''; position: absolute; left: -5px; top: 0;
    width: 11px; height: 9px; background: var(--scrubber);
    clip-path: polygon(0 0, 100% 0, 50% 100%);
    filter: drop-shadow(0 0 4px rgba(240,160,48,0.6));
  }
  .scrubber-playhead::after {
    content: ''; position: absolute; left: -3px; top: 50%;
    transform: translateY(-50%);
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--scrubber); opacity: 0.95;
    box-shadow: 0 0 0 2px rgba(0,0,0,0.7), 0 0 8px rgba(240,160,48,0.6);
  }

  .tooltip {
    position: absolute;
    transform: translate(-50%, -130%);
    background: #000; color: var(--text);
    padding: 2px 6px; border-radius: 3px;
    font-size: 10px;
    font-variant-numeric: tabular-nums;
    font-family: 'Consolas', monospace;
    pointer-events: none;
    border: 1px solid var(--border-l);
    display: none; z-index: 10; white-space: nowrap;
  }
  .tooltip.visible { display: block; }

  /* ─── Grouped hint rows ──────────────────────────────────────────
     Four labeled rows (Navigate / Zoom / Nudge / Mark). The leading
     label is a fixed-width column so all the chip groups line up. */
  .hint-strip {
    display: flex; flex-direction: column; gap: 4px;
    margin-top: 12px; padding: 0 1px;
  }
  .hint-row {
    display: flex; align-items: center; flex-wrap: wrap;
    gap: 5px;
  }
  .hint-row-label {
    flex: 0 0 64px;
    color: var(--muted); font-size: 9px; font-weight: 600;
    letter-spacing: 0.18em; text-transform: uppercase;
  }
  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 2px 8px 2px 3px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
    color: var(--dim); font-size: 10px;
    transition: border-color 0.12s, color 0.12s;
  }
  .chip:hover { border-color: var(--border-l); color: var(--text); }
  .chip kbd {
    background: var(--input); color: var(--text);
    border: 1px solid var(--border-l);
    padding: 1px 6px; border-radius: 3px;
    font-family: 'Consolas', monospace; font-size: 10px;
    font-weight: 500; line-height: 1.3;
    min-width: 16px; text-align: center;
    white-space: nowrap;
  }
</style>
</head>
<body>
<div class="page">

  <div class="topbar">
    <span class="brand">CLIPPING<span>HUB</span></span>
    <span class="crumb">timeline · prototype</span>
  </div>

  <div class="timeline" id="timeline">
    <div class="timeline-header" id="timelineToggle" title="Click to collapse / expand">
      <svg class="chev" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 4.5l3 3 3-3"/></svg>
      <span class="title">Timeline</span>
      <div class="header-stats">
        <span class="stat in"><span class="lbl">IN</span><span class="val" id="lblIn">—</span></span>
        <span class="stat out"><span class="lbl">OUT</span><span class="val" id="lblOut">—</span></span>
        <span class="stat dur"><span class="lbl">DUR</span><span class="val" id="lblDur">—</span></span>
      </div>
    </div>
    <div class="timeline-body">
      <div class="minimap-wrap">
        <div class="minimap" id="minimap">
          <div class="minimap-selection" id="minimapSelection"></div>
          <div class="minimap-mark in"  id="minimapIn"  hidden></div>
          <div class="minimap-mark out" id="minimapOut" hidden></div>
          <div class="minimap-viewport" id="minimapViewport"></div>
          <div class="minimap-playhead" id="minimapPlayhead"></div>
        </div>
      </div>
      <div class="minimap-labels" id="minimapLabels"></div>

      <div class="scrubber-wrap">
        <div class="scrubber" id="scrubber">
          <div class="scrubber-selection" id="scrubberSelection" hidden></div>
          <!-- ticks injected by render() -->
          <div class="scrubber-mark in"  id="scrubberIn"  hidden></div>
          <div class="scrubber-mark out" id="scrubberOut" hidden></div>
          <div class="scrubber-playhead" id="scrubberPlayhead"></div>
        </div>
        <div class="tooltip" id="tooltip">00:00:00</div>
      </div>

      <div class="timeline-footer">
        <span class="readout"><span class="lbl">Playhead</span><span class="val" id="lblPlayhead">00:00:00</span></span>
        <span class="readout"><span class="lbl">View</span><span class="val" id="lblView">00:00:00 → 05:00:00</span><span class="dim">·</span><span class="val" id="lblSpan">5h</span></span>
        <span class="spacer"></span>
        <button id="btnReset" class="reset-btn" title="Reset to full 5h view (R)">Reset view</button>
      </div>
    </div>
  </div>

  <div class="hint-strip">
    <div class="hint-row">
      <span class="hint-row-label">Navigate</span>
      <span class="chip"><kbd>drag</kbd>pan</span>
      <span class="chip"><kbd>drag playhead</kbd>scrub</span>
      <span class="chip"><kbd>click</kbd>seek</span>
    </div>
    <div class="hint-row">
      <span class="hint-row-label">Zoom</span>
      <span class="chip"><kbd>wheel</kbd>zoom</span>
      <span class="chip"><kbd>shift + wheel</kbd>pan</span>
    </div>
    <div class="hint-row">
      <span class="hint-row-label">Nudge</span>
      <span class="chip"><kbd>← →</kbd>1 frame</span>
      <span class="chip"><kbd>shift + ← →</kbd>1 second</span>
      <span class="chip"><kbd>ctrl + ← →</kbd>10 seconds</span>
    </div>
    <div class="hint-row">
      <span class="hint-row-label">Mark</span>
      <span class="chip"><kbd>I</kbd>in</span>
      <span class="chip"><kbd>O</kbd>out</span>
      <span class="chip"><kbd>esc</kbd>clear</span>
      <span class="chip"><kbd>R</kbd>reset view</span>
    </div>
  </div>
</div>

<script>
'use strict';

// ─── Constants & state ─────────────────────────────────────────────────
const TOTAL_SEC = 5 * 3600;   // fake 5h video
const MIN_SPAN  = 2;          // can't zoom in past a 2s window
const ZOOM_STEP = 1.15;       // per wheel notch

const state = {
  viewStart: 0,
  viewEnd:   TOTAL_SEC,
  playhead:  0,
  inMark:    null,
  outMark:   null,
};

// ─── Formatters (mirror of src/lib/clip-format.js) ─────────────────────
function pad2(n) { return String(n).padStart(2, '0'); }
function fmtHMS(s) {
  if (!Number.isFinite(s)) s = 0;
  s = Math.floor(Math.max(0, s));
  return pad2(Math.floor(s / 3600)) + ':' +
         pad2(Math.floor((s % 3600) / 60)) + ':' +
         pad2(s % 60);
}
function fmtDur(s) {
  if (!s || !Number.isFinite(s) || s < 0) return '0:00';
  s = Math.floor(s);
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  return h > 0
    ? h + ':' + pad2(m) + ':' + pad2(sec)
    : m + ':' + pad2(sec);
}
function fmtSpan(s) {
  if (s >= 3600) return (s / 3600).toFixed(s >= 7200 ? 0 : 1) + 'h';
  if (s >= 60)   return (s / 60).toFixed(s >= 600 ? 0 : 1) + 'm';
  return s.toFixed(s >= 10 ? 0 : 1) + 's';
}

// ─── Tick interval picker — adapts to current zoom span ────────────────
function pickTickStep(spanSec) {
  const candidates = [1, 2, 5, 10, 15, 30, 60, 120, 300, 600, 900, 1800, 3600, 7200];
  // Aim for ~8 to ~14 major ticks across the visible width.
  for (const c of candidates) {
    if (spanSec / c <= 14) return c;
  }
  return 7200;
}

// ─── DOM refs ──────────────────────────────────────────────────────────
const el = {
  scrubber:        document.getElementById('scrubber'),
  scrubberPlayhead:document.getElementById('scrubberPlayhead'),
  scrubberIn:      document.getElementById('scrubberIn'),
  scrubberOut:     document.getElementById('scrubberOut'),
  scrubberSel:     document.getElementById('scrubberSelection'),
  minimap:         document.getElementById('minimap'),
  minimapViewport: document.getElementById('minimapViewport'),
  minimapPlayhead: document.getElementById('minimapPlayhead'),
  minimapIn:       document.getElementById('minimapIn'),
  minimapOut:      document.getElementById('minimapOut'),
  minimapSel:      document.getElementById('minimapSelection'),
  minimapLabels:   document.getElementById('minimapLabels'),
  tooltip:         document.getElementById('tooltip'),
  lblPlayhead:     document.getElementById('lblPlayhead'),
  lblView:         document.getElementById('lblView'),
  lblSpan:         document.getElementById('lblSpan'),
  lblIn:           document.getElementById('lblIn'),
  lblOut:          document.getElementById('lblOut'),
  lblDur:          document.getElementById('lblDur'),
  btnReset:        document.getElementById('btnReset'),
};

// ─── Coordinate helpers ────────────────────────────────────────────────
function span() { return state.viewEnd - state.viewStart; }
function timeToFrac(t) { return (t - state.viewStart) / span(); }
function fracToTime(f) { return state.viewStart + f * span(); }
function clampView() {
  const s = span();
  if (state.viewStart < 0) state.viewStart = 0;
  if (state.viewStart > TOTAL_SEC - s) state.viewStart = TOTAL_SEC - s;
  state.viewEnd = state.viewStart + s;
}

// ─── Render ────────────────────────────────────────────────────────────
function render() {
  // Info bar
  el.lblPlayhead.textContent = fmtHMS(state.playhead);
  el.lblView.textContent     = fmtHMS(state.viewStart) + ' → ' + fmtHMS(state.viewEnd);
  el.lblSpan.textContent     = fmtSpan(span());
  el.lblIn.textContent       = state.inMark  != null ? fmtHMS(state.inMark)  : '—';
  el.lblOut.textContent      = state.outMark != null ? fmtHMS(state.outMark) : '—';
  el.lblDur.textContent      = (state.inMark != null && state.outMark != null && state.outMark > state.inMark)
    ? fmtDur(state.outMark - state.inMark) : '—';

  // Main scrubber: ticks
  const sw = el.scrubber.clientWidth;
  const visible = span();
  const step = pickTickStep(visible);
  // Wipe old ticks
  Array.from(el.scrubber.querySelectorAll('.scrubber-tick, .scrubber-tick-label')).forEach(n => n.remove());
  const firstTick = Math.ceil(state.viewStart / step) * step;
  for (let t = firstTick; t <= state.viewEnd; t += step) {
    const f = timeToFrac(t);
    if (f < 0 || f > 1) continue;
    const x = f * sw;
    const tick = document.createElement('div');
    tick.className = 'scrubber-tick major';
    tick.style.left = x + 'px';
    el.scrubber.appendChild(tick);
    const lbl = document.createElement('div');
    lbl.className = 'scrubber-tick-label';
    lbl.style.left = x + 'px';
    lbl.textContent = visible >= 60 ? fmtHMS(t) : (fmtHMS(t).slice(3));  // hide hours when irrelevant
    el.scrubber.appendChild(lbl);
  }
  // Sub-ticks (5 between majors) for finer reference
  const minor = step / 5;
  if (minor >= visible / 200) {  // don't draw if they'd be denser than ~200 lines
    const firstMinor = Math.ceil(state.viewStart / minor) * minor;
    for (let t = firstMinor; t <= state.viewEnd; t += minor) {
      if (Math.abs(t / step - Math.round(t / step)) < 1e-6) continue;  // skip majors
      const f = timeToFrac(t);
      if (f < 0 || f > 1) continue;
      const tick = document.createElement('div');
      tick.className = 'scrubber-tick';
      tick.style.left = (f * sw) + 'px';
      tick.style.bottom = '32px';   // shorter than majors
      el.scrubber.appendChild(tick);
    }
  }

  // Main scrubber: playhead
  const phFrac = timeToFrac(state.playhead);
  if (phFrac >= 0 && phFrac <= 1) {
    el.scrubberPlayhead.style.display = '';
    el.scrubberPlayhead.style.left = (phFrac * 100) + '%';
  } else {
    el.scrubberPlayhead.style.display = 'none';
  }

  // Main scrubber: marks
  function placeMark(t, node) {
    if (t == null) { node.hidden = true; return; }
    const f = timeToFrac(t);
    if (f < 0 || f > 1) { node.hidden = true; return; }
    node.hidden = false;
    node.style.left = (f * 100) + '%';
  }
  placeMark(state.inMark,  el.scrubberIn);
  placeMark(state.outMark, el.scrubberOut);

  // Main scrubber: selection band
  if (state.inMark != null && state.outMark != null && state.outMark > state.inMark) {
    const a = Math.max(timeToFrac(state.inMark),  0);
    const b = Math.min(timeToFrac(state.outMark), 1);
    if (b > a) {
      el.scrubberSel.hidden = false;
      el.scrubberSel.style.left = (a * 100) + '%';
      el.scrubberSel.style.width = ((b - a) * 100) + '%';
    } else {
      el.scrubberSel.hidden = true;
    }
  } else {
    el.scrubberSel.hidden = true;
  }

  // Minimap viewport
  const mmStartPct = (state.viewStart / TOTAL_SEC) * 100;
  const mmEndPct   = (state.viewEnd   / TOTAL_SEC) * 100;
  el.minimapViewport.style.left  = mmStartPct + '%';
  el.minimapViewport.style.width = (mmEndPct - mmStartPct) + '%';

  // Minimap playhead
  el.minimapPlayhead.style.left = ((state.playhead / TOTAL_SEC) * 100) + '%';

  // Minimap marks
  if (state.inMark != null) {
    el.minimapIn.hidden = false;
    el.minimapIn.style.left = ((state.inMark / TOTAL_SEC) * 100) + '%';
  } else el.minimapIn.hidden = true;

  if (state.outMark != null) {
    el.minimapOut.hidden = false;
    el.minimapOut.style.left = ((state.outMark / TOTAL_SEC) * 100) + '%';
  } else el.minimapOut.hidden = true;

  // Minimap selection band
  if (state.inMark != null && state.outMark != null && state.outMark > state.inMark) {
    const a = (state.inMark  / TOTAL_SEC) * 100;
    const b = (state.outMark / TOTAL_SEC) * 100;
    el.minimapSel.style.left  = a + '%';
    el.minimapSel.style.width = (b - a) + '%';
    el.minimapSel.style.display = '';
  } else {
    el.minimapSel.style.display = 'none';
  }

  // Minimap labels (fixed positions — full-range orientation)
  el.minimapLabels.innerHTML = '';
  for (let i = 0; i <= 4; i++) {
    const t = (TOTAL_SEC / 4) * i;
    const lbl = document.createElement('span');
    lbl.style.left = (i * 25) + '%';
    lbl.textContent = fmtHMS(t);
    el.minimapLabels.appendChild(lbl);
  }
}

// ─── Interactions (Navigator strip — CapCut/Vegas-style) ──────────────
//
// State model:
//   idle      → mousedown captures origin; mode is null until movement
//                exceeds the context-aware drag threshold.
//   click     → mouseup before threshold → seek to mousedown position.
//   scrub     → mousedown landed inside playhead hit zone → playhead
//                follows cursor; edge auto-pan slides the whole view (span
//                preserved) when cursor is in the outer EDGE_AUTOPAN_FRAC.
//   pan       → mousedown landed elsewhere → drag the time-under-cursor
//                point with the cursor (Photoshop-hand-tool feel).
//
// All viewport mutations preserve span by going through shiftView() or by
// updating viewStart and viewEnd in lock-step. Updating one without the
// other lets clampView() recompute span from a mismatched pair and the
// visible range silently grows — that was the v3 "growing on edge" bug.
//
// rAF-coalesce render() during drag so input latency stays under 16ms.

// Lower threshold when starting from the playhead so scrubbing is snappy;
// higher threshold from background so accidental pans don't eat clicks.
const DRAG_THRESHOLD_SCRUB = 2;
const DRAG_THRESHOLD_PAN   = 4;
const PLAYHEAD_HIT_RADIUS  = 9;   // px — area around the playhead line that grabs as scrub
const EDGE_AUTOPAN_FRAC    = 0.06; // outer 6% of scrubber width triggers auto-pan during scrub
// Auto-pan rate as PIXELS per frame at full intensity. Pixel-uniform feel
// regardless of zoom level — much better than fraction-of-span which made
// auto-pan blistering when zoomed out and crawling when zoomed in.
const EDGE_AUTOPAN_PX_PER_FRAME = 6;

let drag = null;       // { startX, startClientX, startTime, viewStartAtDown, rect, hitPlayhead, mode }
let renderQueued = false;
let autoPanRAF = null;

function scheduleRender() {
  if (renderQueued) return;
  renderQueued = true;
  requestAnimationFrame(() => { renderQueued = false; render(); });
}

function isNearPlayhead(localX, rect) {
  const phX = timeToFrac(state.playhead) * rect.width;
  return Math.abs(localX - phX) <= PLAYHEAD_HIT_RADIUS &&
         timeToFrac(state.playhead) >= 0 && timeToFrac(state.playhead) <= 1;
}

// Edge auto-pan: while scrubbing, if the cursor sits near an edge of the
// scrubber, the WHOLE view slides toward the cursor (span preserved) so the
// user can keep scrubbing past the visible window without releasing.
//
// Critical: must shift viewStart AND viewEnd together. Updating one without
// the other lets clampView() recompute span from the mismatched values and
// the visible range silently grows (or shrinks). Always use shiftView().
function shiftView(deltaSec) {
  state.viewStart += deltaSec;
  state.viewEnd   += deltaSec;
  clampView();   // clampView preserves span as long as both fields are in sync
}

function maintainEdgeAutoPan(getLocalX, getWidth) {
  if (autoPanRAF) cancelAnimationFrame(autoPanRAF);
  function tick() {
    autoPanRAF = null;
    if (!drag || drag.mode !== 'scrub') return;
    const x = getLocalX();
    const w = getWidth();
    if (w <= 0) return;
    const edge = w * EDGE_AUTOPAN_FRAC;
    let intensity = 0;
    let dir = 0;
    if (x < edge)            { intensity = 1 - Math.max(0, x / edge);           dir = -1; }
    else if (x > w - edge)   { intensity = 1 - Math.max(0, (w - x) / edge);     dir = +1; }
    if (intensity <= 0) return;

    // Pixel-uniform auto-pan: convert "N px/frame" to seconds via current span:width ratio.
    const secPerPx = span() / w;
    const shift    = dir * EDGE_AUTOPAN_PX_PER_FRAME * intensity * secPerPx;
    const beforeStart = state.viewStart;
    shiftView(shift);
    // If the view didn't actually move (already clamped at boundary), stop
    // looping — nothing more to do.
    if (state.viewStart === beforeStart) return;

    // Keep the playhead pinned under the cursor as the view scrolls past it.
    state.playhead = Math.max(0, Math.min(TOTAL_SEC, fracToTime(x / w)));
    scheduleRender();
    autoPanRAF = requestAnimationFrame(tick);
  }
  autoPanRAF = requestAnimationFrame(tick);
}

el.scrubber.addEventListener('mousedown', (e) => {
  if (e.button !== 0) return;
  const rect = el.scrubber.getBoundingClientRect();
  const localX = e.clientX - rect.left;
  drag = {
    startClientX:    e.clientX,
    startLocalX:     localX,
    startTime:       fracToTime(localX / rect.width),
    viewStartAtDown: state.viewStart,
    rect,
    hitPlayhead:     isNearPlayhead(localX, rect),
    mode:            null,
  };
  e.preventDefault();
});

window.addEventListener('mousemove', (e) => {
  // Hover cursor affordance when not dragging
  if (!drag) {
    if (e.target === el.scrubber || el.scrubber.contains(e.target)) {
      const rect = el.scrubber.getBoundingClientRect();
      const localX = e.clientX - rect.left;
      el.scrubber.style.cursor = isNearPlayhead(localX, rect) ? 'ew-resize' : '';
    }
    return;
  }

  const dx = e.clientX - drag.startClientX;

  // Latch mode once the user moves past a context-aware threshold:
  // scrubs commit early (snappy playhead grab); pans commit later (so a
  // sloppy click on background doesn't accidentally pan).
  if (drag.mode == null) {
    const threshold = drag.hitPlayhead ? DRAG_THRESHOLD_SCRUB : DRAG_THRESHOLD_PAN;
    if (Math.abs(dx) < threshold) return;
    drag.mode = drag.hitPlayhead ? 'scrub' : 'pan';
    el.scrubber.classList.add(drag.mode === 'pan' ? 'panning' : 'scrubbing');
    // Kill the minimap viewport's transition so it tracks the cursor 1:1 during drag
    el.minimapViewport.style.transition = 'none';
    // Hide the hover tooltip during active drag — it just gets in the way
    el.tooltip.classList.remove('visible');
  }

  const localX = e.clientX - drag.rect.left;

  if (drag.mode === 'scrub') {
    const t = fracToTime(localX / drag.rect.width);
    state.playhead = Math.max(0, Math.min(TOTAL_SEC, t));
    // Kick auto-pan if near edge; it stops itself when the cursor leaves the edge zone
    maintainEdgeAutoPan(
      () => e.clientX - el.scrubber.getBoundingClientRect().left,
      () => el.scrubber.clientWidth
    );
  } else if (drag.mode === 'pan') {
    // Pin drag.startTime to the current cursor X — feels like dragging the timeline itself.
    // Preserve span by setting viewStart and recomputing viewEnd in lock-step.
    const sp = state.viewEnd - state.viewStart;
    state.viewStart = drag.startTime - (localX / drag.rect.width) * sp;
    state.viewEnd   = state.viewStart + sp;
    clampView();
  }
  scheduleRender();
});

window.addEventListener('mouseup', (e) => {
  if (!drag) return;
  // No drag committed → treat as a click (seek)
  if (drag.mode == null) {
    state.playhead = Math.max(0, Math.min(TOTAL_SEC, drag.startTime));
    render();
  }
  el.scrubber.classList.remove('panning', 'scrubbing');
  el.minimapViewport.style.transition = '';
  if (autoPanRAF) { cancelAnimationFrame(autoPanRAF); autoPanRAF = null; }
  drag = null;
});

// Wheel: zoom around cursor (default), pan with shift, or pan with horizontal trackpad scroll
el.scrubber.addEventListener('wheel', (e) => {
  e.preventDefault();
  const rect = el.scrubber.getBoundingClientRect();
  const cursorFrac = (e.clientX - rect.left) / rect.width;
  const cursorTime = fracToTime(cursorFrac);

  // Pan if shift held OR trackpad's horizontal axis dominates
  const isPan = e.shiftKey || Math.abs(e.deltaX) > Math.abs(e.deltaY);
  if (isPan) {
    const delta = e.shiftKey ? e.deltaY : e.deltaX;
    shiftView((delta / 100) * span() * 0.25);
    scheduleRender();
    return;
  }

  // Zoom around cursor
  const factor = e.deltaY > 0 ? ZOOM_STEP : 1 / ZOOM_STEP;
  let newSpan = span() * factor;
  newSpan = Math.max(MIN_SPAN, Math.min(TOTAL_SEC, newSpan));
  state.viewStart = cursorTime - cursorFrac * newSpan;
  state.viewEnd   = state.viewStart + newSpan;
  clampView();
  scheduleRender();
}, { passive: false });

// Hover tooltip on main scrubber (skipped during drag; mode-aware cursor handled in window mousemove)
el.scrubber.addEventListener('mousemove', (e) => {
  if (drag) return;
  const rect = el.scrubber.getBoundingClientRect();
  const f = (e.clientX - rect.left) / rect.width;
  const t = fracToTime(f);
  el.tooltip.textContent = fmtHMS(t);
  el.tooltip.style.left = (e.clientX - rect.left) + 'px';
  el.tooltip.style.top  = '0px';
  el.tooltip.classList.add('visible');
});
el.scrubber.addEventListener('mouseleave', () => {
  if (drag) return;
  el.tooltip.classList.remove('visible');
  el.scrubber.style.cursor = '';   // reset to the CSS default ('grab') — don't leave it stuck on ew-resize
});

// ─── Arrow-step nudges (NLE-style) ─────────────────────────────────────
// Plain  → 1 frame  (assumes 30fps; the prototype has no real source fps)
// Shift  → 1 second
// Ctrl   → 10 seconds
// Auto-pan kicks in if the stepped playhead leaves the visible view —
// scrolls the navigator so the playhead stays in frame at any zoom level.
const ASSUMED_FPS  = 30;
const NUDGE_FRAME  = 1 / ASSUMED_FPS;
const NUDGE_SEC    = 1;
const NUDGE_BIG    = 10;

function nudgePlayhead(seconds) {
  state.playhead = Math.max(0, Math.min(TOTAL_SEC, state.playhead + seconds));
  // Follow the playhead: if it left the view, slide the view to keep it
  // inside (with a 5% lead-in margin so it's not glued to the edge).
  const sp = state.viewEnd - state.viewStart;
  const margin = sp * 0.05;
  if (state.playhead < state.viewStart + margin) {
    shiftView(state.playhead - (state.viewStart + margin));
  } else if (state.playhead > state.viewEnd - margin) {
    shiftView(state.playhead - (state.viewEnd - margin));
  }
  render();
}

// Keyboard
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === 'i' || e.key === 'I') {
    state.inMark = state.playhead;
    if (state.outMark != null && state.outMark <= state.inMark) state.outMark = null;
    render();
  } else if (e.key === 'o' || e.key === 'O') {
    if (state.inMark != null && state.playhead <= state.inMark) {
      // Reject: OUT must be after IN
      el.lblOut.style.transition = 'color 0.1s'; el.lblOut.style.color = 'red';
      setTimeout(() => { el.lblOut.style.color = ''; }, 250);
      return;
    }
    state.outMark = state.playhead;
    render();
  } else if (e.key === 'Escape') {
    state.inMark = null;
    state.outMark = null;
    render();
  } else if (e.key === 'r' || e.key === 'R') {
    resetView();
  } else if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
    e.preventDefault();
    const dir = e.key === 'ArrowRight' ? +1 : -1;
    const step = e.ctrlKey ? NUDGE_BIG : (e.shiftKey ? NUDGE_SEC : NUDGE_FRAME);
    nudgePlayhead(dir * step);
  }
});

// Reset button
function resetView() {
  state.viewStart = 0;
  state.viewEnd = TOTAL_SEC;
  render();
}
el.btnReset.addEventListener('click', resetView);

// ─── Timeline collapse/expand ──────────────────────────────────────────
(function initTimelineCollapse(){
  const tl = document.getElementById('timeline');
  const hdr = document.getElementById('timelineToggle');
  hdr.addEventListener('click', e => {
    // ignore clicks bubbling up from the header-stats text (they shouldn't toggle)
    if (e.target.closest('.header-stats') && e.target !== hdr) return;
    tl.classList.toggle('collapsed');
  });
})();

// Re-render on resize so tick layout adapts
window.addEventListener('resize', () => render());

// Initial render
render();
</script>
</body>
