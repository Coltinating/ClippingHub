<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>ClippingHub &mdash; Detached Player</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body { background: #000; margin: 0; padding: 0; height: 100vh; }
    .det-root { display: flex; flex-direction: column; height: 100vh; }
    .det-video-wrap { flex: 1; min-height: 0; position: relative; background: #000; }
    .det-video-wrap video { width: 100%; height: 100%; object-fit: contain; }
    .det-controls {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 10px; background: var(--surface);
      border-top: 1px solid var(--border);
    }
    .det-controls .det-spacer { flex: 1; }
    .det-progress {
      flex: 1; height: 6px; background: rgba(255,255,255,0.12);
      border-radius: 3px; cursor: pointer; position: relative;
    }
    .det-progress-fill { background: var(--scrubber); height: 100%; width: 0%; border-radius: 3px; }
    .det-time {
      font-family: 'Consolas', monospace; font-size: 11px;
      color: var(--muted); min-width: 90px; text-align: right;
    }
    .det-btn {
      background: transparent; color: var(--text);
      border: 1px solid var(--border); border-radius: 999px;
      padding: 3px 12px; font-size: 11px; cursor: pointer;
    }
    .det-btn.in  { border-color: var(--green); color: var(--green); }
    .det-btn.out { border-color: var(--red);   color: var(--red); }
    .det-btn:hover { background: rgba(255,255,255,0.06); }
    .det-btn.active { background: rgba(46,204,113,0.16); }
  </style>
</head>
<body>
<div class="det-root">
  <div class="det-video-wrap">
    <video id="det-vid" autoplay></video>
  </div>
  <div class="det-controls">
    <button class="det-btn" id="det-playPause">&#9654;</button>
    <div class="det-progress" id="det-progress"><div class="det-progress-fill" id="det-progressFill"></div></div>
    <span class="det-time" id="det-time">0:00 / 0:00</span>
    <span class="det-spacer"></span>
    <button class="det-btn in"  id="det-markIn"  title="Mark IN at playhead">IN</button>
    <button class="det-btn out" id="det-markOut" title="Mark OUT at playhead">OUT</button>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="lib/detached-mark.js"></script>
<script src="detached-player.js"></script>
</body>
</html>
