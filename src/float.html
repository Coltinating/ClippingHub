<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; connect-src *; media-src *;">
  <link rel="stylesheet" href="styles.css">
  <style>
    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: var(--bg-base, #0c0c0e); color: var(--text-primary, #e8e8ed); }
    .float-titlebar {
      height: 28px; display: flex; align-items: center;
      padding: 0 8px; background: var(--bg-header, #0a0a0c); -webkit-app-region: drag;
      border-bottom: 1px solid var(--border, #1e1e24); user-select: none; font-size: 11px;
      color: var(--text-secondary, #8e8ea0); font-weight: 500;
    }
    .float-grip {
      -webkit-app-region: no-drag; cursor: grab; padding: 0 6px 0 0; opacity: 0.4;
      font-size: 10px; letter-spacing: 1px; display: flex; align-items: center;
    }
    .float-grip:hover { opacity: 0.8; }
    .float-grip:active { cursor: grabbing; }
    .float-grip svg { width: 10px; height: 10px; }
    #floatTitle { flex: 1; padding: 0 6px; }
    .float-close {
      -webkit-app-region: no-drag; background: none; border: none;
      color: var(--text-muted, #555); cursor: pointer; padding: 2px 6px;
      border-radius: 3px; font-size: 13px; line-height: 1;
    }
    .float-close:hover { background: var(--bg-hover, #1c1c24); color: var(--accent-red, #e53e3e); }
    .float-content { flex: 1; display: flex; flex-direction: column; min-height: 0; }
    #floatBody { display: flex; flex-direction: column; height: calc(100vh - 28px); overflow: hidden; }
  </style>
</head>
<body>
  <div class="float-titlebar">
    <div class="float-grip" id="floatGrip" title="Drag to dock">
      <svg viewBox="0 0 10 10" fill="currentColor"><circle cx="2" cy="2" r="1"/><circle cx="6" cy="2" r="1"/><circle cx="2" cy="5" r="1"/><circle cx="6" cy="5" r="1"/><circle cx="2" cy="8" r="1"/><circle cx="6" cy="8" r="1"/></svg>
    </div>
    <span id="floatTitle">Panel</span>
    <button class="float-close" id="floatCloseBtn" title="Close">&#10005;</button>
  </div>
  <div id="floatBody" class="float-content">
  </div>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script src="float-renderer.js"></script>
</body>
</html>
