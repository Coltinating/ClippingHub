<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Batch Test Progress — Clipper Hub (DEV)</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a0a;
  --surface: #111;
  --border: #272727;
  --text: #d4d4d8;
  --dim: #71717a;
  --muted: #52525b;
  --accent: #7b61ff;
  --red: #ef4444;
  --green: #22c55e;
  --yellow: #f59e0b;
}

html, body {
  height: 100%; overflow: hidden;
  background: var(--bg); color: var(--text);
  font-family: 'Segoe UI', system-ui, sans-serif;
  font-size: 13px;
}

.bp-app { display: flex; flex-direction: column; height: 100vh; }

.bp-header {
  padding: 10px 16px; background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  -webkit-app-region: drag;
}
.bp-header > * { -webkit-app-region: no-drag; }
.bp-title { font-weight: 700; font-size: 13px; color: var(--red); }
.bp-title-sub { font-size: 10px; color: var(--muted); margin-left: 6px; }
.bp-close {
  background: none; border: 1px solid var(--border); color: var(--dim);
  border-radius: 4px; padding: 2px 8px; cursor: pointer; font-size: 12px;
}
.bp-close:hover { color: var(--text); border-color: #444; }

.bp-body {
  flex: 1; overflow-y: auto; padding: 14px 16px;
  font-family: 'Courier New', monospace; font-size: 11px;
  line-height: 1.6;
}
.bp-body::-webkit-scrollbar { width: 6px; }
.bp-body::-webkit-scrollbar-track { background: var(--bg); }
.bp-body::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 3px; }

.bp-overall {
  padding: 10px 12px; background: var(--surface);
  border: 1px solid var(--border); border-radius: 6px;
  margin-bottom: 10px;
}
.bp-overall-title { font-weight: 600; font-size: 12px; margin-bottom: 6px; color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; }
.bp-bar { height: 8px; background: #1e1e1e; border-radius: 4px; overflow: hidden; margin-bottom: 4px; }
.bp-bar-fill { height: 100%; border-radius: 4px; transition: width 0.3s; background: var(--accent); }
.bp-bar-fill.done { background: var(--green); }
.bp-pct { font-size: 10px; color: var(--dim); }

.bp-log-line { color: var(--dim); padding: 1px 0; }
.bp-log-line.test-start { color: var(--accent); font-weight: 600; margin-top: 8px; }
.bp-log-line.clip-done { color: var(--green); }
.bp-log-line.clip-fail { color: var(--red); }
.bp-log-line.complete { color: var(--green); font-weight: 700; margin-top: 10px; font-size: 12px; }

.bp-footer {
  padding: 8px 16px; background: var(--surface);
  border-top: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  font-size: 10px; color: var(--dim);
}
.bp-open-btn {
  background: var(--accent); color: #fff; border: none;
  border-radius: 4px; padding: 4px 12px; font-size: 11px;
  cursor: pointer; display: none;
}
.bp-open-btn:hover { background: #6a4fff; }
.bp-open-btn.show { display: block; }

.bp-idle {
  color: var(--muted); text-align: center; padding: 40px;
  font-family: 'Segoe UI', system-ui, sans-serif; font-size: 13px;
}
</style>
</head>
<body>
<div class="bp-app">
  <div class="bp-header">
    <div>
      <span class="bp-title">BATCH TEST</span>
      <span class="bp-title-sub">FOR DEVELOPMENT PURPOSES</span>
    </div>
    <button class="bp-close" id="closeBtn">Close</button>
  </div>

  <div class="bp-body" id="bpBody">
    <div class="bp-idle" id="bpIdle">Waiting for batch test to start...</div>
    <div id="bpOverall" style="display:none">
      <div class="bp-overall">
        <div class="bp-overall-title" id="bpTitle">Initializing...</div>
        <div class="bp-bar"><div class="bp-bar-fill" id="bpBarFill" style="width:0%"></div></div>
        <div class="bp-pct" id="bpPct">0%</div>
      </div>
    </div>
    <div id="bpLog"></div>
  </div>

  <div class="bp-footer">
    <span id="bpStatus">Idle</span>
    <button class="bp-open-btn" id="bpOpenFolder">Open Output Folder</button>
  </div>
</div>

<script>
(function() {
  const body = document.getElementById('bpBody');
  const idle = document.getElementById('bpIdle');
  const overall = document.getElementById('bpOverall');
  const title = document.getElementById('bpTitle');
  const barFill = document.getElementById('bpBarFill');
  const pct = document.getElementById('bpPct');
  const log = document.getElementById('bpLog');
  const status = document.getElementById('bpStatus');
  const openBtn = document.getElementById('bpOpenFolder');
  let outputFolder = '';

  document.getElementById('closeBtn').onclick = () => {
    if (window.batchBridge) window.batchBridge.close();
  };

  openBtn.onclick = () => {
    if (outputFolder && window.batchBridge) window.batchBridge.openFolder(outputFolder);
  };

  function addLog(text, cls) {
    const div = document.createElement('div');
    div.className = 'bp-log-line' + (cls ? ' ' + cls : '');
    div.textContent = text;
    log.appendChild(div);
    body.scrollTop = body.scrollHeight;
  }

  if (window.batchBridge) {
    window.batchBridge.onUpdate((data) => {
      if (data.type === 'start') {
        idle.style.display = 'none';
        overall.style.display = 'block';
        log.innerHTML = '';
        const posInfo = data.totalPositions > 1 ? `, ${data.totalPositions} positions` : '';
        title.textContent = `Running: ${data.totalTests} configs${posInfo}, ${data.totalClips} clips`;
        barFill.style.width = '0%';
        barFill.classList.remove('done');
        pct.textContent = '0%';
        status.textContent = 'Running...';
        openBtn.classList.remove('show');
        addLog(`[${new Date().toLocaleTimeString()}] Full test started — ${data.totalTests} configs x ${data.totalPositions || 1} positions x ${data.clipsPerTest} copies = ${data.totalClips} total`);
      }

      if (data.type === 'test-start') {
        addLog(`\n[Config ${data.testIndex}/${data.totalTests}] ${data.configSummary}`, 'test-start');
        title.textContent = `Config ${data.testIndex}/${data.totalTests} — ${data.configSummary}`;
      }

      if (data.type === 'position-start') {
        addLog(`  Position ${data.posIndex}/${data.totalPositions}: ${data.posLabel}`, 'test-start');
      }

      if (data.type === 'clip-start') {
        addLog(`    Downloading ${data.clipName}...`);
        status.textContent = `Config ${data.testIndex}/${data.totalTests} — ${data.clipName}`;
      }

      if (data.type === 'clip-done') {
        addLog(`    ✓ ${data.clipName} — ${data.fileSize}`, 'clip-done');
        const p = Math.round((data.completed / data.totalClips) * 100);
        barFill.style.width = p + '%';
        pct.textContent = `${data.completed}/${data.totalClips} (${p}%)`;
      }

      if (data.type === 'clip-fail') {
        addLog(`    ✗ ${data.clipName} — ${data.error}`, 'clip-fail');
        const p = Math.round((data.completed / data.totalClips) * 100);
        barFill.style.width = p + '%';
        pct.textContent = `${data.completed}/${data.totalClips} (${p}%)`;
      }

      if (data.type === 'complete') {
        barFill.style.width = '100%';
        barFill.classList.add('done');
        pct.textContent = `${data.totalClips}/${data.totalClips} (100%)`;
        title.textContent = 'Full test complete!';
        status.textContent = `Done — ${data.totalClips} clips in ${data.elapsed}`;
        addLog(`\n[${new Date().toLocaleTimeString()}] Full test complete! ${data.totalClips} clips across ${data.totalTests} tests`, 'complete');
        outputFolder = data.outputFolder || '';
        if (outputFolder) openBtn.classList.add('show');
      }
    });
  }
})();
</script>
</body>
</html>
