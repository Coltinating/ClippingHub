appId: com.clippinghub.app
productName: ClippingHub
copyright: Copyright © 2026 Coltinating
asar: true

directories:
  output: dist

files:
  - "**/*"
  - "!dist/**"
  - "!build/**"
  - "!tests/**"
  - "!assets/**"
  - "!docs/**"
  - "!misc/**"
  - "!.claude/**"
  - "!installerplans/**"
  - "!fix-starttime.bat"
  - "!*.log"
  - "!_tmp_*"
  - "!_cap_*"
  - "!resources/whisper/**"

# ── Per-OS targets ─────────────────────────────────────────────
win:
  target:
    - target: nsis
      arch: [x64]
  icon: build/icon.ico
  extraResources:
    # Bundle Windows-only ffmpeg binaries. Try the legacy flat layout first,
    # then per-platform subdir if you've migrated to it.
    - from: "build/ffmpeg/win32"
      to: "ffmpeg"
      filter: ["**/*", "!.gitkeep"]
    - from: "build/ffmpeg"
      to: "ffmpeg"
      filter: ["*.exe"]

mac:
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]
  icon: build/icons/icon.icns
  category: public.app-category.video
  hardenedRuntime: true
  gatekeeperAssess: false
  # entitlements: build/entitlements.mac.plist   # uncomment when DevID is configured
  # notarize: true                               # uncomment after Apple ID env vars are set
  extraResources:
    - from: "build/ffmpeg/darwin"
      to: "ffmpeg"
      filter: ["**/*", "!.gitkeep"]

linux:
  target:
    - AppImage
    - deb
    - rpm
  category: AudioVideo
  icon: build/icons
  extraResources:
    - from: "build/ffmpeg/linux"
      to: "ffmpeg"
      filter: ["**/*", "!.gitkeep"]

# ── Installer config (Windows) ─────────────────────────────────
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  include: build/installer.nsh

# ── Linux package metadata ─────────────────────────────────────
deb:
  depends:
    - libnss3
    - libgbm1
    - libasound2
appImage:
  category: AudioVideo

# ── Update channel ─────────────────────────────────────────────
publish:
  provider: github
  owner: Coltinating
  repo: ClippingHub
  releaseType: release
