<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ClippingHub Admin</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- ── Sign-in overlay ────────────────────────────────────── -->
  <div id="signinOverlay" class="signin-overlay" data-state="signin">
    <div class="signin-card" role="dialog" aria-labelledby="signinTitle">
      <div class="signin-brand">
        <span class="dev-tag">[DEV]</span>
        <span class="signin-title" id="signinTitle">ClippingHub Admin</span>
      </div>
      <p class="signin-sub">Operator console — sign in with your admin token to continue.</p>

      <form id="signinForm" class="signin-form" autocomplete="off">
        <label class="signin-field">
          <span class="signin-label">Display name</span>
          <input id="signinName" type="text" placeholder="Mark" autocomplete="off" required maxlength="32">
        </label>

        <label class="signin-field">
          <span class="signin-label">Admin token</span>
          <div class="signin-input-row">
            <input id="signinToken" type="password" placeholder="paste token from server console or .env" autocomplete="off" required spellcheck="false">
            <button type="button" id="signinTokenToggle" class="btn btn-ghost btn-xs" aria-label="Show token">show</button>
          </div>
          <span class="signin-hint">If <code>ADMIN_TOKEN</code> isn't set in the server <code>.env</code>, the server prints a random dev token on boot.</span>
        </label>

        <label class="signin-remember">
          <input id="signinRemember" type="checkbox">
          <span>Remember on this device</span>
        </label>

        <div id="signinError" class="signin-error" hidden></div>

        <button type="submit" id="signinSubmit" class="btn btn-primary signin-submit">
          <span id="signinSubmitLabel">Sign in</span>
        </button>
      </form>
    </div>
  </div>

  <!-- ── Main console ──────────────────────────────────────── -->
  <header class="topbar">
    <div class="brand">
      <span class="dev-tag">[DEV]</span>
      <span class="brand-title">ClippingHub Admin</span>
    </div>
    <div class="topbar-spacer"></div>
    <div class="topbar-identity" id="topbarIdentity" hidden>
      <span class="topbar-id-label">Signed in as</span>
      <span class="topbar-id-name" id="topbarIdName">—</span>
    </div>
    <span id="connStatus" class="conn-pill" data-state="offline" role="status" aria-live="polite">● Offline</span>
    <button id="signoutBtn" class="btn btn-ghost btn-sm" hidden>Sign out</button>
  </header>

  <nav class="topnav">
    <button class="topnav-tab active" data-view="lobbies">Lobbies</button>
    <button class="topnav-tab" data-view="events">Events</button>
  </nav>

  <main class="layout" data-view="lobbies">
    <aside class="sidebar">
      <div class="sidebar-head">
        <span>Lobbies</span>
        <button id="refreshBtn" class="btn btn-ghost btn-xs" title="Refresh lobby list" aria-label="Refresh lobby list">⟳</button>
      </div>
      <ul id="lobbyList" class="lobby-list">
        <li class="lobby-empty">Connect to load lobbies.</li>
      </ul>
    </aside>

    <section class="detail">
      <div id="detailEmpty" class="detail-empty">
        <span>Select a lobby on the left to view it.</span>
      </div>

      <div id="detailContent" class="detail-content" hidden>
        <div class="detail-head">
          <div>
            <h2 id="lobbyName">—</h2>
            <div class="lobby-meta">
              <span class="lobby-code-pill" id="lobbyCode">------</span>
              <span class="muted" id="lobbyMembersText">0 members</span>
              <span class="muted" id="lobbyChatText">0 messages</span>
              <span class="muted" id="lobbyRangesText">0 ranges</span>
            </div>
          </div>
          <div class="detail-actions">
            <button id="joinBtn" class="btn btn-primary btn-sm">Join as [DEV]</button>
            <button id="leaveBtn" class="btn btn-ghost btn-sm" hidden>Leave</button>
            <button id="deleteBtn" class="btn btn-danger btn-sm" title="Permanently delete this lobby (kicks all members)">Delete</button>
          </div>
        </div>

        <div class="tabs" role="tablist">
          <button class="tab active" data-tab="members">Members</button>
          <button class="tab" data-tab="chat">Chat</button>
          <button class="tab" data-tab="ranges">Ranges</button>
        </div>

        <div class="tab-panel" data-tab-panel="members">
          <ul id="memberList" class="member-list"></ul>
        </div>

        <div class="tab-panel" data-tab-panel="chat" hidden>
          <div id="chatList" class="chat-list"></div>
          <div class="chat-compose">
            <input id="chatInput" type="text" placeholder="Send to this lobby (you don't have to be joined)">
            <button id="chatSendBtn" class="btn btn-primary btn-sm">Send</button>
          </div>
        </div>

        <div class="tab-panel" data-tab-panel="ranges" hidden>
          <ul id="rangeList" class="range-list"></ul>
        </div>
      </div>
    </section>
  </main>

  <section class="events-view" data-view="events" hidden>
    <div class="events-toolbar">
      <input id="eventsSearch" class="events-search" type="text" placeholder="Search events…" spellcheck="false" autocomplete="off">
      <span id="eventsCount" class="muted">0 events</span>
      <span class="events-spacer"></span>
      <label class="events-autoscroll">
        <input id="eventsAutoscroll" type="checkbox" checked> autoscroll
      </label>
      <button id="eventsClearBtn" class="btn btn-ghost btn-xs">Clear</button>
    </div>
    <div class="events-filters" id="eventsFilters">
      <button class="filter-chip active" data-evt="ws:in">WS In</button>
      <button class="filter-chip active" data-evt="ws:out">WS Out</button>
      <button class="filter-chip active" data-evt="ws:broadcast">Broadcast</button>
      <button class="filter-chip active" data-evt="handler">Handler</button>
      <button class="filter-chip active" data-evt="ws:close">Close</button>
      <button class="filter-chip active" data-evt="ws:error">Error</button>
      <button class="filter-chip active" data-evt="other">Other</button>
    </div>
    <div id="eventsList" class="events-list"></div>
  </section>

  <script src="app.js"></script>
</body>
</html>
